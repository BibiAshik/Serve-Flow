version: '3.8'

services:
  serveflow-app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://serveflow-db:3306/serveflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      serveflow-db:
        condition: service_healthy

  serveflow-db:
    image: mysql:8.3.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=serveflow_db
      - MYSQL_ROOT_PASSWORD=root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
    volumes:
      - serveflow-db-data:/var/lib/mysql

volumes:
  serveflow-db-data:
