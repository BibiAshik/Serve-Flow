# ============================================================
# ServeFlow — application.properties
# Automated Canteen Billing & Token Platform
#
# IMPORTANT — SECRETS:
# This file contains placeholder values for all secrets.
# NEVER commit real secrets to GitHub.
# Fill in real values locally. Before committing, ensure
# all secret values are replaced with environment variable
# references or moved to application-local.properties.
# ============================================================

spring.application.name=ServeFlow
spring.profiles.active=local
server.port=${PORT:8080}

# ============================================================
# MYSQL DATABASE — PRIMARY (serveflow_db)
# Create the database first: CREATE DATABASE serveflow_db;
# Then fill in your MySQL username and password below.
# ============================================================
# Database configuration will be loaded from application-local.properties locally,
# or from SPRING_DATASOURCE_* environment variables in production.

# Hibernate — update mode so new entities create tables automatically
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# H2 IN-MEMORY DATABASE — OPTIONAL FALLBACK
# To switch to H2 (no MySQL needed):
#   1. Comment out the MySQL block above
#   2. Uncomment the four lines below
# ============================================================
# spring.datasource.url=jdbc:h2:mem:serveflowdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ============================================================
# STATIC FILE SERVING
# ============================================================
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ============================================================
# JWT CONFIGURATION
# jwt.secret: a long random string used to sign tokens.
#   Generate one at: https://www.uuidgenerator.net/
#   Must be at least 256 bits (32 characters) for HS256.
# jwt.expiration-ms: token lifetime in milliseconds.
#   86400000 = 24 hours
# ============================================================
# JWT Secret loaded from application-local.properties locally or JWT_SECRET env variable.
jwt.expiration-ms=86400000

# ============================================================
# GOOGLE OAUTH2 — CAMPUS BITE STUDENT LOGIN
#
# SETUP STEPS (do this once):
# 1. Go to https://console.cloud.google.com
# 2. Create a new project (e.g. "ServeFlow")
# 3. Go to "APIs & Services" -> "OAuth consent screen"
#    - Choose "External", fill in app name, your email
# 4. Go to "APIs & Services" -> "Credentials"
#    - Click "Create Credentials" -> "OAuth Client ID"
#    - Application type: "Web application"
#    - Authorized redirect URIs: http://localhost:8080/login/oauth2/code/google
#    - Click Create -> copy the Client ID and Client Secret
# 5. Paste them below
#
# Only @sairamtap.edu.in email accounts will be granted access.
# All other Google accounts are rejected by OAuth2SuccessHandler.
# ============================================================
# Google OAuth secrets loaded from application-local.properties locally or env variables.
spring.security.oauth2.client.registration.google.scope=email,profile

# ============================================================
# RAZORPAY PAYMENT GATEWAY — TEST MODE
#
# SETUP STEPS:
# 1. Create a Razorpay account at https://razorpay.com
# 2. Go to Dashboard -> Settings -> API Keys
# 3. Generate Test Mode keys (Key ID + Key Secret)
# 4. Paste them below
#
# For the static UPI QR (QuickBill counter):
#   Dashboard -> Payment Pages -> QR Codes -> Create New
#   Type: Multiple Use, Never Expire
#   This QR generates webhook events when customers pay.
#
# For webhook (local development with ngrok):
#   Run: ngrok http 8080
#   Copy the https URL (e.g. https://abc123.ngrok.io)
#   Razorpay Dashboard -> Webhooks -> Add New Webhook
#   URL: https://abc123.ngrok.io/api/webhook/razorpay
#   Select event: payment.captured
#   Copy the webhook secret and paste as razorpay.webhook.secret below
# ============================================================
# Razorpay secrets loaded from application-local.properties locally or env variables.

# ============================================================
# BUSINESS LOGIC CONFIGURATION
# ============================================================

# Lunch start time — online ordering closes 15 minutes before this.
# Format: HH:mm (24-hour). Default: 12:30 PM.
# Example: if lunch starts at 12:30, ordering closes at 12:15.
app.lunch-start-time=23:59

# Payment matching time window — when searching for a payment to
# match a bill (or vice versa), only consider payments received
# within the last N minutes. Prevents old unmatched payments from
# being accidentally matched to new bills.
app.matching-window-minutes=10

# College email domain — only Google accounts with this domain
# can log into Campus Bite. Change requires restart.
app.college-email-domain=@sairamtap.edu.in

# ============================================================
# THERMAL PRINTER CONFIGURATION
# Used by PrinterService to connect to the ESC/POS printer.
# If no printer is reachable at this host:port, PrinterService
# automatically falls back to virtual (on-screen) printing.
# ============================================================
app.printer.host=localhost
app.printer.port=9100

# ============================================================
# DEV MODE — SIMULATE PAYMENT ENDPOINT
#
# When true: POST /api/dev/simulate-payment is active.
# This lets you test the payment matching engine without a
# real Razorpay QR code or ngrok tunnel.
#
# WARNING: Set to false before any production or public deployment!
# The app prints a startup warning when this is true.
# ============================================================
app.dev-mode=true
